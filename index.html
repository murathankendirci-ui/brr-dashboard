<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRR Property Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: #f0f2f5; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #2c5aa0 0%, #1e3a5f 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .panel { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: 500; margin-bottom: 6px; font-size: 13px; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #2c5aa0; color: white; }
        .btn-primary:hover:not(:disabled) { background: #1e3a5f; }
        .btn-primary:disabled { background: #ccc; opacity: 0.6; }
        .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ddd; }
        .error { background: #fee; color: #c33; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #c33; }
        .success { background: #efe; color: #3c3; padding: 15px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #3c3; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .empty { text-align: center; padding: 60px 20px; color: #666; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f9f9f9; }
        .price { color: #27ae60; font-weight: 600; }
        .roi { background: #e8f5e9; color: #27ae60; padding: 4px 8px; border-radius: 4px; font-weight: 600; }
        .setup { background: white; padding: 40px; border-radius: 12px; max-width: 500px; margin: 50px auto; text-align: center; box-shadow: 0 4px 12px; }
        .setup input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 15px; }
        .setup p { color: #666; margin-bottom: 15px; }
        .comparison { background: #f9f9f9; padding: 20px; border-radius: 12px; margin-top: 20px; border: 2px solid #ddd; }
    </style>
</head>
